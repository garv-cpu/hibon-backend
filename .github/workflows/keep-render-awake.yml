name: Keep Render API Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      HIBON_API_URL: ${{ vars.HIBON_API_URL || secrets.HIBON_API_URL }}
    steps:
      - name: Ping health endpoint
        run: |
          if [ -z "$HIBON_API_URL" ]; then
            echo "::warning::Set HIBON_API_URL as a repository variable or secret, for example https://hibon-api.onrender.com"
            exit 0
          fi

          curl --fail --silent --show-error --location \
            --max-time 25 \
            --retry 3 \
            --retry-delay 5 \
            "$HIBON_API_URL/health"
